<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketLens - Tablero Financiero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.0/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <nav class="bg-gray-800 border-b border-gray-700 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-wider text-blue-400">🔍 MARKET<span class="text-white">LENS</span></h1>
            <span class="text-sm text-gray-400 bg-gray-700 px-3 py-1 rounded-full border border-gray-600">PostgreSQL Conectado</span>
        </div>
    </nav>

    <main class="container mx-auto p-6 space-y-8">
        
        <section class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md">
            <h2 class="text-lg font-bold mb-3 text-gray-300">Buscar Activo</h2>
            <form id="buscador-form" class="flex gap-4 max-w-md">
                <input 
                    type="text" 
                    id="ticker-input" 
                    placeholder="Ej: AAPL, TSLA, GGAL" 
                    class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 w-full text-white focus:outline-none focus:border-blue-500 uppercase font-semibold tracking-wider"
                    required
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-2 rounded-lg transition duration-200"
                >
                    Buscar
                </button>
            </form>
            <p id="mensaje-busqueda" class="text-sm mt-2 hidden"></p>
        </section>

        <section class="bg-gray-800 rounded-xl border border-gray-700 shadow-md overflow-hidden">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-white">Indicadores en Tiempo Real</h2>
                <button id="btn-refrescar" class="text-sm bg-gray-700 hover:bg-gray-600 px-4 py-1.5 rounded-lg border border-gray-600 transition">
                    🔄 Refrescar DB
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-750 text-gray-400 text-xs uppercase tracking-wider border-b border-gray-700">
                        <tr>
                            <th class="p-4">ID</th>
                            <th class="p-4">Ticker</th>
                            <th class="p-4">Nombre</th>
                            <th class="p-4 text-right">Precio Actual</th>
                            <th class="p-4 text-right">Variación</th>
                            <th class="p-4 text-right">Cap. de Mercado</th>
                            <th class="p-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-indicadores-body" class="divide-y divide-gray-700 text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="seccion-grafico" class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md hidden">
           <div class="flex flex-col md:flex-row items-center justify-between bg-slate-800 p-3 rounded-lg mb-4 border border-slate-700 gap-4">
                <div class="flex items-center gap-4 w-full md:w-2/3">
                    <label for="range-dias" class="text-sm font-medium text-slate-300 whitespace-nowrap">
                        📅 Días: <span id="valor-dias" class="text-blue-400 font-bold">30</span>
                    </label>
                    <input 
                        type="range" id="range-dias" min="2" max="30" value="30" 
                        class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                        oninput="cambiarRangoDias(this.value)"
                    >
                </div>

                <div class="flex bg-slate-900 p-1 rounded-lg border border-slate-700">
                    <button id="btn-vista-linea" onclick="cambiarTipoVista('linea')" class="bg-blue-500 text-white px-3 py-1.5 rounded-md text-xs font-medium transition-colors">
                        📈 Línea
                    </button>
                    <button id="btn-vista-velas" onclick="cambiarTipoVista('velas')" class="text-slate-400 hover:text-white px-3 py-1.5 rounded-md text-xs font-medium transition-colors">
                        🕯️ Velas
                    </button>
                </div>
            </div>

            </div>
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 id="grafico-titulo" class="text-xl font-bold text-white">Historial de Precios</h2>
                    <p class="text-sm text-gray-450">Evolución del precio de cierre (Últimos 30 días en tu DB)</p>
                </div>
                <button 
                    class="text-gray-400 hover:text-white text-sm bg-gray-700 px-3 py-1 rounded-lg border border-gray-600"
                    onclick="document.getElementById('seccion-grafico').classList.add('hidden')"
                >
                    ✕ Cerrar
                </button>
            </div>

            <div class="relative w-full h-80">
                <canvas id="historicoChart"></canvas>
            </div>
        </section>

    </main>

    <script src="app.js"></script>

    <div id="modal-confirmacion" class="hidden fixed inset-0 bg-black/75 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center">
            <div class="text-red-500 text-4xl mb-3">⚠️</div>
            <h3 id="modal-titulo" class="text-xl font-bold text-white mb-2">¿Eliminar activo?</h3>
            <p id="modal-mensaje" class="text-slate-400 text-sm mb-6">¿Estás seguro de que querés realizar esta acción?</p>
            
            <div class="flex justify-center gap-3">
                <button id="btn-modal-cancelar" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                    Cancelar
                </button>
                <button id="btn-modal-confirmar" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                    Eliminar
                </button>
            </div>
        </div>
    </div>
</body>
</html>
